{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6" data-aos="fade-up">
        <div class="card">
            <div class="card-header bg-dark text-white fw-bold">
                <i class="fas fa-user-shield me-2"></i>Admin Profile
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <strong><i class="fas fa-envelope me-2"></i>Email:</strong> <span class="gradient-text">{{ current_user.email }}</span>
                </div>
                <div class="mb-3">
                    <strong><i class="fas fa-user-tag me-2"></i>Role:</strong> {{ current_user.role }}
                </div>
                <div class="mb-3">
                    <strong><i class="fas fa-calendar-alt me-2"></i>Joined:</strong> {{ current_user.created_at.strftime('%Y-%m-%d') }}
                </div>
                <a href="{{ url_for('change_password') }}" class="btn btn-secondary rounded-pill"><i class="fas fa-key me-2"></i>Change Password</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
