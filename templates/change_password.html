{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5" data-aos="fade-up">
        <div class="card">
            <div class="card-header bg-warning fw-bold">
                <i class="fas fa-key me-2"></i>Change Password
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Current Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                            <input type="password" name="current_password" class="form-control" required placeholder="Current password">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-key"></i></span>
                            <input type="password" name="new_password" class="form-control" required placeholder="New password">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-check-circle"></i></span>
                            <input type="password" name="confirm_password" class="form-control" required placeholder="Confirm new password">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 rounded-pill py-2">
                        <i class="fas fa-save me-1"></i>Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
