{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card-soft">
      <h3 class="section-title">Change Password</h3>
      <form method="post">
        <div class="mb-3"><label class="form-label">Current Password</label><input class="form-control" type="password" name="current_password" required></div>
        <div class="mb-3"><label class="form-label">New Password</label><input class="form-control" type="password" name="new_password" required minlength="6"></div>
        <div class="mb-3"><label class="form-label">Confirm New Password</label><input class="form-control" type="password" name="confirm_password" required minlength="6"></div>
        <button class="btn btn-primary w-100">Update Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
