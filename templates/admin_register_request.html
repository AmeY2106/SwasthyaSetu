{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5" data-aos="zoom-in">
        <div class="card">
            <div class="card-header bg-dark text-white fw-bold">
                <i class="fas fa-user-shield me-2"></i>Admin Registration
            </div>
            <div class="card-body">
                <form method="POST">
                    {{ form.hidden_tag() }}
                    <div class="mb-3">
                        {{ form.email.label(class="form-label fw-bold") }}
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fas fa-envelope"></i></span>
                            {{ form.email(class="form-control", placeholder="admin@example.com") }}
                        </div>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 rounded-pill py-2">
                        <i class="fas fa-paper-plane me-1"></i>Send OTP
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
