{% extends "layout.html" %}
{% block content %}
<div class="card" data-aos="fade-up">
    <div class="card-header bg-info text-white fw-bold">
        <i class="fas fa-book me-2"></i>All Bookings
    </div>
    <div class="card-body table-responsive p-0">
        <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr>
                    <th>ID</th><th>Patient</th><th>Hospital</th><th>Bed Type</th><th>Status</th><th>Date</th>
                </tr>
            </thead>
            <tbody>
                {% for b in bookings %}
                <tr>
                    <td><span class="badge bg-secondary">{{ b.booking_id[:8] }}..</span></td>
                    <td>{{ b.patient_name }}</td>
                    <td>{{ b.hospital.hospital_name }}</td>
                    <td><i class="fas fa-bed me-1"></i>{{ b.bed_type }}</td>
                    <td><span class="badge bg-{{ 'success' if b.status=='confirmed' else 'warning' if b.status=='pending' else 'secondary' }}">{{ b.status }}</span></td>
                    <td>{{ b.booking_date.strftime('%Y-%m-%d') }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
