{% extends 'base.html' %}
{% block content %}
<h2 class="section-title">Site Content</h2>
<div class="card-soft">
  <form method="post">
    {% for c in contents %}
    <div class="mb-3">
      <label class="form-label"><code>{{ c.key }}</code> <small class="text-muted">{{ c.description or '' }}</small></label>
      <textarea name="value_{{ c.id }}" class="form-control" rows="2">{{ c.value }}</textarea>
    </div>
    {% endfor %}
    <button class="btn btn-primary">Save All</button>
  </form>
</div>
{% endblock %}
